<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1100px;height:300px;background:transparent;overflow:hidden;user-select:none;-webkit-app-region:drag;font-family:'Malgun Gothic',sans-serif}
.nd{-webkit-app-region:no-drag}

/* ── 카드 모드 ── */
#logo-card{position:absolute;right:0;bottom:0;width:84px;height:84px;border-radius:18px;background:linear-gradient(145deg,rgba(22,14,6,0.97),rgba(48,28,8,0.97));border:1.5px solid rgba(190,148,72,0.45);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;z-index:500;box-shadow:0 6px 28px rgba(0,0,0,0.65),inset 0 1px 0 rgba(220,180,100,0.12);-webkit-app-region:no-drag;transition:transform 0.15s,box-shadow 0.15s}
#logo-card:hover{transform:scale(1.05);box-shadow:0 8px 32px rgba(200,140,40,0.35),inset 0 1px 0 rgba(220,180,100,0.18)}
#logo-card .card-label{font-size:8px;font-weight:700;letter-spacing:0.08em;color:rgba(200,165,90,0.85)}
/* 카드 모드일 때 위젯 본체 숨기기 */
body.card-mode>svg,body.card-mode .cw,body.card-mode #tooltip,body.card-mode #arko-bubble,body.card-mode #chat-panel,body.card-mode #arko-bar{display:none!important}
/* 전체 위젯일 때 카드 숨기기 */
body:not(.card-mode) #logo-card{display:none}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(3) saturate(2)}}
@keyframes shimmer{0%,100%{opacity:0.1}50%{opacity:0.22}}
.glow-screen{animation:glow 0.85s ease-in-out infinite}
.sun-shimmer{animation:shimmer 4s ease-in-out infinite}

/* 캐릭터 래퍼 */
.cw{position:absolute;top:48px;width:140px;height:168px;cursor:pointer;-webkit-app-region:no-drag}
/* 상태 점 */
.sdot{position:absolute;top:4px;right:4px;width:11px;height:11px;border-radius:50%;background:#44dd44;border:1.5px solid rgba(0,0,0,0.18);z-index:2;pointer-events:none}
/* 명찰 */
.badge{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);height:17px;padding:0 10px;border-radius:8.5px;display:flex;align-items:center;font-size:9px;font-weight:700;color:white;white-space:nowrap;opacity:0.92;pointer-events:none;transition:background 0.3s}
/* lottie 컨테이너 */
.lbox{width:100%;height:100%}

/* Tooltip */
#tooltip{position:absolute;background:rgba(8,10,22,0.96);border:1px solid rgba(70,110,200,0.4);border-radius:10px;padding:10px 13px;min-width:175px;color:#dce8f8;font-size:11px;pointer-events:none;display:none;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.6)}
#tooltip .tt-name{font-size:13px;font-weight:700;margin-bottom:5px;color:#7ab8ff}
#tooltip .tt-task{color:#a8d0ff;margin-bottom:2px}
#tooltip .tt-eta{color:#70e070;font-size:10px;margin-bottom:6px}
#tooltip .tt-q{border-top:1px solid rgba(70,110,200,0.22);padding-top:5px;margin-top:2px}
#tooltip .tt-qi{color:#b8d4f0;font-size:10px;padding:3px 6px;margin:1px 0;border-radius:4px;cursor:pointer;pointer-events:all}
#tooltip .tt-qi:hover{background:rgba(50,90,180,0.35);color:#fff}

/* 채팅 패널 */
#chat-panel{position:absolute;bottom:28px;left:0;right:0;height:0;background:rgba(7,9,20,0.97);border-top:1px solid rgba(50,90,160,0.4);border-radius:12px 12px 0 0;overflow:hidden;transition:height 0.22s ease;z-index:200;display:flex;flex-direction:column}
#chat-panel.open{height:256px}
#chat-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid rgba(50,90,160,0.22);flex-shrink:0}
#chat-name-label{font-size:12px;font-weight:700;color:#7ab8ff}
#chat-close{background:none;border:none;color:#506880;font-size:14px;cursor:pointer;-webkit-app-region:no-drag;padding:0 4px}
#chat-close:hover{color:#e04838}
#chat-msgs{flex:1;overflow-y:auto;padding:7px 11px;display:flex;flex-direction:column;gap:4px}
#chat-msgs::-webkit-scrollbar{width:3px}
#chat-msgs::-webkit-scrollbar-thumb{background:rgba(70,110,200,0.3);border-radius:2px}
.mu{align-self:flex-end;background:rgba(35,70,175,0.55);color:#cce4ff;padding:4px 10px;border-radius:8px 8px 2px 8px;font-size:11px;max-width:82%}
.ma{align-self:flex-start;background:rgba(25,35,58,0.9);color:#b8d4f0;padding:4px 10px;border-radius:8px 8px 8px 2px;font-size:11px;max-width:82%;border:1px solid rgba(50,90,160,0.22)}
.mt{color:#506880;font-style:italic;font-size:10px;align-self:flex-start;padding:2px 6px}
#chat-row{display:flex;gap:6px;padding:6px 10px;flex-shrink:0;border-top:1px solid rgba(50,90,160,0.18)}
#chat-in{flex:1;background:rgba(15,22,42,0.9);border:1px solid rgba(50,90,160,0.32);border-radius:6px;color:#cce4ff;font-size:11px;padding:5px 10px;outline:none;font-family:'Malgun Gothic',sans-serif;-webkit-app-region:no-drag}
#chat-in:focus{border-color:rgba(70,130,240,0.6)}
#chat-btn{background:rgba(35,70,190,0.75);border:none;color:#7ab8ff;border-radius:6px;padding:5px 13px;cursor:pointer;font-size:11px;-webkit-app-region:no-drag}

/* 아르코 입력바 */
#arko-bar{position:absolute;bottom:0;left:0;right:0;height:36px;background:rgba(5,7,20,0.93);border-top:1px solid rgba(45,85,210,0.32);display:flex;align-items:center;gap:8px;padding:0 14px;z-index:300}
.arko-lbl{color:#5588ff;font-size:10.5px;font-weight:700;white-space:nowrap;-webkit-app-region:no-drag}
#arko-quick{flex:1;background:transparent;border:none;color:#cce4ff;font-size:11px;outline:none;-webkit-app-region:no-drag;font-family:'Malgun Gothic',sans-serif}
#arko-quick::placeholder{color:rgba(80,120,190,0.45)}
#arko-send{background:rgba(35,70,190,0.65);border:none;color:#7ab8ff;border-radius:5px;padding:2px 11px;cursor:pointer;font-size:11px;-webkit-app-region:no-drag;flex-shrink:0}
#arko-send:hover{background:rgba(55,95,220,0.9)}

/* 아르코 말풍선 */
#arko-bubble{position:absolute;top:24px;left:8px;max-width:230px;background:rgba(6,9,24,0.96);border:1px solid rgba(60,110,240,0.5);border-radius:10px 10px 10px 2px;padding:7px 12px;color:#cce4ff;font-size:10.5px;line-height:1.55;display:none;z-index:160;pointer-events:none;box-shadow:0 3px 16px rgba(0,0,0,0.6)}
#arko-bubble.thinking{color:#4466aa;font-style:italic}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<script>
// ── Lottie 초기화 ─────────────────────────────
const CHAR_LIST=['arko','noah','eden','ria','secretary','luka'];
const anims={};

CHAR_LIST.forEach(name=>{
  try{
    anims[name]=lottie.loadAnimation({
      container:document.getElementById('lottie-'+name),
      renderer:'svg',
      loop:true,
      autoplay:true,
      path:`./assets/chars/${name}.json`,
    });
    anims[name].setSpeed(0.65);
  }catch(e){console.warn('[Lottie] 로드 실패:',name,e);}
});

// ── 시간대 하늘 ─────────────────────────────
const SKY=[{h:0,g:'sky-night'},{h:5,g:'sky-dawn'},{h:8,g:'sky-day'},{h:17,g:'sky-sunset'},{h:20,g:'sky-dusk'}];
function updateSky(){
  const h=new Date().getHours();let g='sky-night';
  for(const t of SKY){if(h>=t.h)g=t.g;}
  document.querySelectorAll('.sky-bg').forEach(el=>el.setAttribute('fill',`url(#${g})`));
}
updateSky();setInterval(updateSky,60000);

// ── 엔진 상태 ────────────────────────────────
const SCREENS  ={arko:'#1e30c0',noah:'#0a5020',eden:'#400880',ria:'#800818',luka:'#803000',secretary:'#806000'};
const ACTIVE   ={arko:'#4488ff',noah:'#22ee66',eden:'#cc44ff',ria:'#ff2266',luka:'#ff7722',secretary:'#ffcc22'};
const BADGE    ={arko:'#3355EE',noah:'#18B84A',eden:'#9922CC',ria:'#EE1155',luka:'#FF6600',secretary:'#EEA800'};
const NAMES    ={arko:'아르코',noah:'노아',eden:'이든',ria:'리아',luka:'루카',secretary:'김비서'};
const ROLES    ={arko:'총괄',noah:'분석',eden:'기획',ria:'집필',luka:'기록',secretary:'일정'};

const S={
  arko:{working:false,task:null,queue:[]},
  noah:{working:false,task:null,queue:[]},
  eden:{working:false,task:null,queue:[]},
  ria:{working:false,task:null,queue:[]},
  luka:{working:false,task:null,queue:[]},
  secretary:{working:false,task:null,queue:[]},
};

function setState(name,working,task){
  const scr  =document.getElementById('scr-'+name);
  const dot  =document.getElementById('dot-'+name);
  const badge=document.getElementById('badge-'+name);
  if(!dot)return;
  S[name].working=working;
  if(task)S[name].task=task;
  if(!working)S[name].task=null;

  if(working){
    if(scr){scr.setAttribute('fill',ACTIVE[name]);scr.setAttribute('opacity','0.9');scr.classList.add('glow-screen');}
    dot.style.background='#40e8ff';
    if(badge){badge.style.background='#40e8ff';badge.style.color='#1a1828';badge.textContent=`${ROLES[name]}:${NAMES[name]} ●`;}
    if(anims[name])anims[name].setSpeed(1.8);
  }else{
    if(scr){scr.setAttribute('fill',SCREENS[name]);scr.setAttribute('opacity','0.35');scr.classList.remove('glow-screen');}
    dot.style.background='#44dd44';
    if(badge){badge.style.background=BADGE[name];badge.style.color='white';badge.textContent=`${ROLES[name]}:${NAMES[name]}`;}
    if(anims[name])anims[name].setSpeed(0.65);
  }
}

// ── Tooltip ──────────────────────────────────
const TIP=document.getElementById('tooltip');
let tipT;
const CX={arko:78,noah:220,eden:362,ria:505,secretary:648,luka:953};

function showTip(name){
  clearTimeout(tipT);
  const s=S[name];
  document.getElementById('tt-name').textContent=`${ROLES[name]}:${NAMES[name]}`;
  document.getElementById('tt-task').textContent=s.working?(s.task?'🔵 '+s.task:'🔵 작업 중...'):'⬜ 대기 중';
  document.getElementById('tt-eta').textContent=s.working?'처리 중...':'';
  const qd=document.getElementById('tt-q');
  const qi=document.getElementById('tt-qi');
  if(s.queue&&s.queue.length){
    qd.style.display='block';
    qi.innerHTML=s.queue.map((t,i)=>`<div class="tt-qi" onclick="prioritize('${name}',${i})"><span>${i+1}.</span>${t}</div>`).join('');
  }else{qd.style.display='none';}
  TIP.style.display='block';
  let tx=CX[name]-88;if(tx<4)tx=4;if(tx+190>1100)tx=906;
  TIP.style.left=tx+'px';TIP.style.top='220px';
}
function hideTip(){tipT=setTimeout(()=>TIP.style.display='none',300);}
TIP.addEventListener('mouseenter',()=>clearTimeout(tipT));
TIP.addEventListener('mouseleave',hideTip);

// ── 채팅 ──────────────────────────────────────
let curEngine=null;
const hist={};

function openChat(name){
  curEngine=name;
  if(!hist[name])hist[name]=[];
  document.getElementById('chat-name-label').textContent=`${ROLES[name]}:${NAMES[name]}`;
  const msgs=document.getElementById('chat-msgs');
  msgs.innerHTML='';
  hist[name].forEach(m=>addMsg(m.role,m.content));
  document.getElementById('chat-panel').classList.add('open');
  document.getElementById('arko-bar').style.display='none';
  setTimeout(()=>document.getElementById('chat-in').focus(),50);
}
function closeChat(){
  document.getElementById('chat-panel').classList.remove('open');
  document.getElementById('arko-bar').style.display='flex';
}
function addMsg(role,content){
  const msgs=document.getElementById('chat-msgs');
  const d=document.createElement('div');
  d.className=role==='user'?'mu':(content==='...'?'mt':'ma');
  d.textContent=content;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
  return d;
}
async function sendChat(){
  const inp=document.getElementById('chat-in');
  const msg=inp.value.trim();
  if(!msg||!curEngine)return;
  inp.value='';
  const name=curEngine;
  if(!hist[name])hist[name]=[];
  hist[name].push({role:'user',content:msg});
  addMsg('user',msg);
  const thinking=addMsg('agent','...');
  try{
    const r=await fetch('http://localhost:3001/execute',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        projectId:'widget-chat',projectName:'widget-chat',projectType:'chat',
        taskType:name==='secretary'?'assist':'clarify',
        instruction:msg,context:{conversationHistory:hist[name].slice(0,-1)},
      })
    });
    const d=await r.json();
    const reply=d.output?.data?.message||d.output?.data?.reply||d.output?.data?.response||'(응답 없음)';
    thinking.remove();addMsg('agent',reply);
    hist[name].push({role:'assistant',content:reply});
    if(name==='arko'&&d.output?.data?.action==='ready'){
      const pd=d.output.data;const ctx=pd.gatheredContext||{};
      addMsg('agent','파이프라인 시작! 🚀');
      fetch('http://localhost:3001/pipeline',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({projectName:ctx.details||msg.slice(0,30),projectType:pd.projectType||'playlist',goal:pd.enrichedInstruction||msg,enrichedContext:ctx})
      });
    }
  }catch(e){thinking.remove();addMsg('agent','연결 오류가 발생했어요.');}
}

// ── 아르코 빠른 입력 ──────────────────────────
let arkoHistory=[];
let bubbleTimer=null;
document.getElementById('arko-quick').addEventListener('keydown',e=>{if(e.key==='Enter')sendQuick();});

async function sendQuick(){
  const inp=document.getElementById('arko-quick');
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  showBubble('생각 중...',true);
  try{
    const r=await fetch('http://localhost:3001/execute',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        projectId:'widget-quick',projectName:'widget',projectType:'unknown',
        taskType:'clarify',instruction:msg,
        context:{conversationHistory:arkoHistory},
      })
    });
    const d=await r.json();
    const data=d.output?.data||{};
    const reply=data.message||'...';
    arkoHistory.push({role:'user',content:msg});
    arkoHistory.push({role:'assistant',content:reply});
    if(arkoHistory.length>12)arkoHistory=arkoHistory.slice(-12);
    showBubble(reply,false);
    if(data.action==='ready'){
      const ctx=data.gatheredContext||{};
      setTimeout(()=>{
        showBubble('파이프라인 시작! 팀에게 전달할게요 🚀',false);
        fetch('http://localhost:3001/pipeline',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({projectName:ctx.details||msg.slice(0,30),projectType:data.projectType||'playlist',goal:data.enrichedInstruction||msg,enrichedContext:ctx})
        });
        arkoHistory=[];
      },600);
    }
  }catch(e){showBubble('연결 오류가 발생했어요.',false);}
}

function showBubble(text,thinking){
  const b=document.getElementById('arko-bubble');
  b.textContent=text;b.className=thinking?'thinking':'';
  b.style.display='block';
  clearTimeout(bubbleTimer);
  if(!thinking)bubbleTimer=setTimeout(()=>{b.style.display='none';},9000);
}

function prioritize(engine,idx){
  const q=S[engine].queue;
  if(idx>0&&idx<q.length){const[i]=q.splice(idx,1);q.unshift(i);}
  hideTip();
}
function openMain(){closeChat();window.widget&&window.widget.openMain();}

// ── 카드 ↔ 전체 위젯 전환 ──────────────────────
function expandWidget(){
  document.body.classList.remove('card-mode');
  if(window.widget)window.widget.resize('full');
}
function collapseToCard(){
  closeChat();
  document.body.classList.add('card-mode');
  if(window.widget)window.widget.resize('card');
}
// 시작 시 카드 모드
document.body.classList.add('card-mode');

// ── SSE ──────────────────────────────────────
try{
  const es=new EventSource('http://localhost:3001/events');
  ['engine:status','engine:done','engine:error','pipeline:done'].forEach(t=>{
    es.addEventListener(t,e=>{
      const d=JSON.parse(e.data);
      if(t==='pipeline:done'){Object.keys(S).forEach(n=>setState(n,false));return;}
      if(d.engine)setState(d.engine,t==='engine:status'&&d.status==='working',d.task||null);
    });
  });
}catch(e){}
</script>
