version: "3.8"

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - CLAUDE_WORKER_PORT=3001
    restart: unless-stopped

  control-room:
    build:
      context: .
      dockerfile: Dockerfile.control-room
    ports:
      - "3000:80"
    depends_on:
      - worker
    restart: unless-stopped
