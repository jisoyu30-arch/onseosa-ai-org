<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1100px;height:300px;background:transparent;overflow:hidden;user-select:none;-webkit-app-region:drag;font-family:'Malgun Gothic',sans-serif}
.nd{-webkit-app-region:no-drag}

/* ── 카드 모드 ── */
#logo-card{position:absolute;right:0;bottom:0;width:84px;height:84px;border-radius:18px;background:linear-gradient(145deg,#0d1117,#161b22);border:1.5px solid rgba(6,182,212,0.3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;z-index:500;box-shadow:0 6px 28px rgba(0,0,0,0.65),0 0 20px rgba(6,182,212,0.1);-webkit-app-region:no-drag;transition:transform 0.15s,box-shadow 0.15s}
#logo-card:hover{transform:scale(1.05);box-shadow:0 8px 32px rgba(6,182,212,0.25),0 0 30px rgba(6,182,212,0.15)}
#logo-card .card-label{font-size:8px;font-weight:700;letter-spacing:0.08em;color:rgba(6,182,212,0.8)}
body.card-mode>svg,body.card-mode .cw,body.card-mode #tooltip,body.card-mode #arko-bubble,body.card-mode #chat-panel,body.card-mode #arko-bar,body.card-mode #pipeline-bar{display:none!important}
body:not(.card-mode) #logo-card{display:none}

/* 애니메이션 */
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(3) saturate(2)}}
@keyframes shimmer{0%,100%{opacity:0.08}50%{opacity:0.18}}
@-webkit-keyframes char-bob{0%,100%{-webkit-transform:translateY(0);transform:translateY(0)}50%{-webkit-transform:translateY(-5px);transform:translateY(-5px)}}
@keyframes char-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes char-work{0%,100%{transform:translateY(0) scale(1)}25%{transform:translateY(-3px) scale(1.02)}50%{transform:translateY(-6px) scale(1.04)}75%{transform:translateY(-3px) scale(1.02)}}
@keyframes char-done{0%{transform:scale(1) translateY(0)}30%{transform:scale(1.1) translateY(-8px)}60%{transform:scale(1) translateY(-2px)}100%{transform:scale(1) translateY(0)}}
@keyframes neon-ring{0%,100%{box-shadow:0 0 6px var(--glow)}50%{box-shadow:0 0 18px var(--glow),0 0 36px var(--glow)}}
@keyframes blink{0%,92%,100%{clip-path:none}94%,98%{clip-path:inset(38% 0 58% 0)}}
@keyframes wander{0%{transform:translateX(0)}25%{transform:translateX(12px)}50%{transform:translateX(-8px)}75%{transform:translateX(5px)}100%{transform:translateX(0)}}
.glow-screen{animation:glow 0.85s ease-in-out infinite}
.sun-shimmer{animation:shimmer 4s ease-in-out infinite}

/* 캐릭터 래퍼 */
.cw{position:absolute;top:42px;width:130px;height:175px;cursor:pointer;-webkit-app-region:no-drag;display:flex;flex-direction:column;align-items:center}
.cw img{width:108px;height:108px;object-fit:cover;object-position:center 20%;border-radius:50%;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4));border:2px solid rgba(255,255,255,0.08)}
.cw:hover img{filter:drop-shadow(0 4px 12px var(--glow));border-color:var(--glow)}
/* 애니메이션은 JS requestAnimationFrame으로 처리 */
.cw.working img{filter:drop-shadow(0 0 16px var(--glow));border-color:var(--glow)}
.cw.working .char-ring{box-shadow:0 0 18px var(--glow),0 0 36px var(--glow)}
.cw.done img{filter:drop-shadow(0 0 14px rgba(34,197,94,0.5));border-color:rgba(34,197,94,0.5)}
/* 상태 점 */
.sdot{position:absolute;top:2px;right:12px;width:10px;height:10px;border-radius:50%;background:#44dd44;border:1.5px solid rgba(0,0,0,0.3);z-index:2;pointer-events:none;transition:background 0.3s}
/* 명찰 */
.badge{height:18px;padding:0 10px;border-radius:9px;display:flex;align-items:center;font-size:9px;font-weight:700;color:white;white-space:nowrap;opacity:0.92;pointer-events:none;transition:background 0.3s;margin-top:4px}
/* 캐릭터 글로우 링 */
.char-ring{width:114px;height:114px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:box-shadow 0.3s;background:rgba(30,41,59,0.6)}

/* Tooltip */
#tooltip{position:absolute;background:rgba(13,17,23,0.96);border:1px solid rgba(6,182,212,0.3);border-radius:10px;padding:10px 13px;min-width:175px;color:#dce8f8;font-size:11px;pointer-events:none;display:none;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.6);backdrop-filter:blur(8px)}
#tooltip .tt-name{font-size:13px;font-weight:700;margin-bottom:5px;color:#7ab8ff}
#tooltip .tt-task{color:#a8d0ff;margin-bottom:2px}
#tooltip .tt-eta{color:#70e070;font-size:10px;margin-bottom:6px}
#tooltip .tt-q{border-top:1px solid rgba(6,182,212,0.2);padding-top:5px;margin-top:2px}
#tooltip .tt-qi{color:#b8d4f0;font-size:10px;padding:3px 6px;margin:1px 0;border-radius:4px;cursor:pointer;pointer-events:all}
#tooltip .tt-qi:hover{background:rgba(6,182,212,0.2);color:#fff}

/* 채팅 패널 */
#chat-panel{position:absolute;bottom:28px;left:0;right:0;height:0;background:rgba(13,17,23,0.97);border-top:1px solid rgba(6,182,212,0.25);border-radius:12px 12px 0 0;overflow:hidden;transition:height 0.22s ease;z-index:200;display:flex;flex-direction:column;backdrop-filter:blur(12px)}
#chat-panel.open{height:256px}
#chat-avatar{position:absolute;right:16px;top:40px;width:90px;height:90px;border-radius:50%;object-fit:cover;object-position:center 20%;border:2px solid rgba(6,182,212,0.3);opacity:0.85;filter:drop-shadow(0 0 12px rgba(6,182,212,0.2));pointer-events:none;z-index:1}
#chat-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid rgba(6,182,212,0.15);flex-shrink:0}
#chat-name-label{font-size:12px;font-weight:700;color:#06b6d4}
#chat-close{background:none;border:none;color:#506880;font-size:14px;cursor:pointer;-webkit-app-region:no-drag;padding:0 4px}
#chat-close:hover{color:#e04838}
#chat-msgs{flex:1;overflow-y:auto;padding:7px 11px;display:flex;flex-direction:column;gap:4px}
#chat-msgs::-webkit-scrollbar{width:3px}
#chat-msgs::-webkit-scrollbar-thumb{background:rgba(6,182,212,0.3);border-radius:2px}
.mu{align-self:flex-end;background:rgba(6,182,212,0.25);color:#cce4ff;padding:4px 10px;border-radius:8px 8px 2px 8px;font-size:11px;max-width:82%}
.ma{align-self:flex-start;background:rgba(30,41,59,0.9);color:#b8d4f0;padding:4px 10px;border-radius:8px 8px 8px 2px;font-size:11px;max-width:82%;border:1px solid rgba(6,182,212,0.15)}
.mt{color:#506880;font-style:italic;font-size:10px;align-self:flex-start;padding:2px 6px}
#chat-row{display:flex;gap:6px;padding:6px 10px;flex-shrink:0;border-top:1px solid rgba(6,182,212,0.12)}
#chat-in{flex:1;background:rgba(30,41,59,0.8);border:1px solid rgba(6,182,212,0.25);border-radius:6px;color:#cce4ff;font-size:11px;padding:5px 10px;outline:none;font-family:'Malgun Gothic',sans-serif;-webkit-app-region:no-drag}
#chat-in:focus{border-color:rgba(6,182,212,0.6)}
#chat-btn{background:rgba(6,182,212,0.3);border:none;color:#06b6d4;border-radius:6px;padding:5px 13px;cursor:pointer;font-size:11px;-webkit-app-region:no-drag}

/* 아르코 입력바 */
#arko-bar{position:absolute;bottom:0;left:0;right:0;height:36px;background:rgba(13,17,23,0.95);border-top:1px solid rgba(6,182,212,0.2);display:flex;align-items:center;gap:8px;padding:0 14px;z-index:300}
.arko-lbl{color:#06b6d4;font-size:10.5px;font-weight:700;white-space:nowrap;-webkit-app-region:no-drag}
#arko-quick{flex:1;background:transparent;border:none;color:#cce4ff;font-size:11px;outline:none;-webkit-app-region:no-drag;font-family:'Malgun Gothic',sans-serif}
#arko-quick::placeholder{color:rgba(6,182,212,0.3)}
#arko-send{background:rgba(6,182,212,0.3);border:none;color:#06b6d4;border-radius:5px;padding:2px 11px;cursor:pointer;font-size:11px;-webkit-app-region:no-drag;flex-shrink:0}
#arko-send:hover{background:rgba(6,182,212,0.5)}

/* 아르코 말풍선 */
#arko-bubble{position:absolute;top:24px;left:8px;max-width:230px;background:rgba(13,17,23,0.96);border:1px solid rgba(6,182,212,0.4);border-radius:10px 10px 10px 2px;padding:7px 12px;color:#cce4ff;font-size:10.5px;line-height:1.55;display:none;z-index:160;pointer-events:none;box-shadow:0 3px 16px rgba(0,0,0,0.6);backdrop-filter:blur(8px)}
#arko-bubble.thinking{color:#4466aa;font-style:italic}
</style>
</head>

     onmouseenter="showTip('luka')" onmouseleave="hideTip()" onclick="openChat('luka')">
  <div class="sdot" id="dot-luka"></div>
  <div class="char-ring" style="--glow:rgba(59,130,246,0.4)"><img src="./assets/chars/luka.png" alt="luka"/></div>
  <div class="badge" id="badge-luka" style="background:#3b82f6">기록:루카</div>
</div>

<!-- Tooltip -->
<div id="tooltip" class="nd">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-task" id="tt-task"></div>
  <div class="tt-eta"  id="tt-eta"></div>
  <div class="tt-q"    id="tt-q" style="display:none">
    <div style="color:#506880;font-size:9px;margin-bottom:3px">대기 (클릭 시 우선 처리)</div>
    <div id="tt-qi"></div>
  </div>
</div>

<!-- 채팅 패널 -->
<div id="chat-panel" class="nd">
  <div id="chat-header">
    <span id="chat-name-label">아르코</span>
    <button id="chat-close" onclick="closeChat()">✕</button>
  </div>
  <img id="chat-avatar" src="./assets/chars/arko.png" alt=""/>
  <div id="chat-msgs"></div>
  <div id="chat-row">
    <input id="chat-in" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sendChat()"/>
    <button id="chat-btn" onclick="sendChat()">전송</button>
  </div>
</div>

<!-- 아르코 말풍선 -->
<div id="arko-bubble" class="nd"></div>

<!-- 카드 모드 로고 -->
<div id="logo-card" onclick="expandWidget()">
  <svg width="40" height="40" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="16" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <circle cx="20" cy="20" r="8" fill="#06b6d4" opacity="0.3"/>
    <circle cx="20" cy="20" r="3" fill="#06b6d4" opacity="0.8"/>
  </svg>
  <div class="card-label">온:서사</div>
</div>

<!-- 파이프라인 진행바 -->
<div id="pipeline-bar" class="nd" style="position:absolute;bottom:36px;left:0;right:0;height:22px;background:rgba(13,17,23,0.92);border-top:1px solid rgba(6,182,212,0.15);display:none;align-items:center;gap:0;padding:0 14px;z-index:290">
  <span style="color:#2d3548;font-size:8px;font-weight:700;letter-spacing:1px;margin-right:8px">PIPELINE</span>
  <div id="pl-steps" style="display:flex;align-items:center;gap:0;flex:1"></div>
  <span id="pl-status" style="color:#06b6d4;font-size:9px;margin-left:8px"></span>
</div>

<!-- 아르코 입력바 -->
<div id="arko-bar" class="nd">
  <span class="arko-lbl">▶ 아르코</span>
  <input id="arko-quick" placeholder="무엇을 만들까요? (Enter)"/>
  <button id="arko-send" onclick="sendQuick()">↵</button>
  <button onclick="collapseToCard()" title="카드로 접기" style="-webkit-app-region:no-drag;background:none;border:none;color:#2d3548;font-size:13px;cursor:pointer;padding:0 6px;line-height:1" onmouseover="this.style.color='#06b6d4'" onmouseout="this.style.color='#2d3548'">⊟</button>
</div>

<script>
// ── 캐릭터 초기화 (PNG 기반, Lottie 불필요) ────
const CHAR_LIST=['arko','noah','eden','ria','mika','luka'];

// ── 시간대 하늘 ─────────────────────────────
const SKY=[{h:0,g:'sky-night'},{h:5,g:'sky-dawn'},{h:8,g:'sky-day'},{h:17,g:'sky-sunset'},{h:20,g:'sky-dusk'}];
function updateSky(){
  const h=new Date().getHours();let g='sky-night';
  for(const t of SKY){if(h>=t.h)g=t.g;}
  document.querySelectorAll('.sky-bg').forEach(el=>el.setAttribute('fill',`url(#${g})`));
}
updateSky();setInterval(updateSky,60000);

// ── 엔진 상태 ────────────────────────────────
const SCREENS  ={arko:'#06b6d4',noah:'#f59e0b',eden:'#10b981',ria:'#f43f5e',mika:'#8b5cf6',luka:'#3b82f6'};
const ACTIVE   ={arko:'#22d3ee',noah:'#fbbf24',eden:'#34d399',ria:'#fb7185',mika:'#a78bfa',luka:'#60a5fa'};
const BADGE    ={arko:'#06b6d4',noah:'#f59e0b',eden:'#10b981',ria:'#f43f5e',mika:'#8b5cf6',luka:'#3b82f6'};
const NAMES    ={arko:'아르코',noah:'노아',eden:'이든',ria:'리아',mika:'미카',luka:'루카'};
const ROLES    ={arko:'총괄',noah:'분석',eden:'기획',ria:'집필',mika:'미디어',luka:'기록'};

const S={};
CHAR_LIST.forEach(n=>S[n]={working:false,task:null,queue:[]});

// 표정 이미지 교체: idle=기본, working=집중, done=기뻐
const charState={};// 각 캐릭터의 현재 표정 상태 추적

function setCharImage(name, mood){
  const cw=document.getElementById('cw-'+name);
  if(!cw)return;
  const img=cw.querySelector('img');
  if(!img)return;
  const suffix=mood==='idle'?'':`-${mood}`;
  const newSrc=`./assets/chars/${name}${suffix}.png`;
  if(img.src.endsWith(newSrc))return;
  // 부드러운 교체
  img.style.opacity='0';
  setTimeout(()=>{
    img.src=newSrc;
    img.style.opacity='1';
  },150);
  charState[name]=mood;
}

function setState(name,working,task){
  const scr  =document.getElementById('scr-'+name);
  const dot  =document.getElementById('dot-'+name);
  const badge=document.getElementById('badge-'+name);
  const cw   =document.getElementById('cw-'+name);
  if(!dot)return;
  const wasWorking=S[name].working;
  S[name].working=working;
  if(task)S[name].task=task;
  if(!working)S[name].task=null;

  if(working){
    if(scr){scr.setAttribute('fill',ACTIVE[name]);scr.setAttribute('opacity','0.9');scr.classList.add('glow-screen');}
    dot.style.background='#22d3ee';
    if(badge){badge.style.background='#22d3ee';badge.style.color='#0d1117';badge.textContent=`${ROLES[name]}:${NAMES[name]} ●`;}
    if(cw){cw.classList.add('working');cw.classList.remove('done');}
    setCharImage(name,'working');
  }else{
    if(scr){scr.setAttribute('fill',SCREENS[name]);scr.setAttribute('opacity','0.2');scr.classList.remove('glow-screen');}
    dot.style.background='#44dd44';
    if(badge){badge.style.background=BADGE[name];badge.style.color='white';badge.textContent=`${ROLES[name]}:${NAMES[name]}`;}
    // 작업 끝났으면 done 표정 → 3초 후 idle로
    if(wasWorking){
      if(cw){cw.classList.remove('working');cw.classList.add('done');}
      setCharImage(name,'done');
      setTimeout(()=>{
        setCharImage(name,'idle');
        if(cw)cw.classList.remove('done');
      },3000);
    }else{
      if(cw){cw.classList.remove('working');cw.classList.remove('done');}
      setCharImage(name,'idle');
    }
  }
}

// ── Tooltip ──────────────────────────────────
const TIP=document.getElementById('tooltip');
let tipT;
const CX={arko:77,noah:217,eden:357,ria:497,mika:637,luka:947};

function showTip(name){
  clearTimeout(tipT);
  const s=S[name];
  document.getElementById('tt-name').textContent=`${ROLES[name]}:${NAMES[name]}`;
  document.getElementById('tt-task').textContent=s.working?(s.task?'● '+s.task:'● 작업 중...'):'○ 대기 중';
  document.getElementById('tt-eta').textContent=s.working?'처리 중...':'';
  const qd=document.getElementById('tt-q');
  const qi=document.getElementById('tt-qi');
  if(s.queue&&s.queue.length){
    qd.style.display='block';
    qi.innerHTML=s.queue.map((t,i)=>`<div class="tt-qi" onclick="prioritize('${name}',${i})"><span>${i+1}.</span>${t}</div>`).join('');
  }else{qd.style.display='none';}
  TIP.style.display='block';
  let tx=CX[name]-88;if(tx<4)tx=4;if(tx+190>1100)tx=906;
  TIP.style.left=tx+'px';TIP.style.top='220px';
}
function hideTip(){tipT=setTimeout(()=>TIP.style.display='none',300);}
TIP.addEventListener('mouseenter',()=>clearTimeout(tipT));
TIP.addEventListener('mouseleave',hideTip);

// ── 채팅 ──────────────────────────────────────
let curEngine=null;
const hist={};

function openChat(name){
  curEngine=name;
  if(!hist[name])hist[name]=[];
  document.getElementById('chat-name-label').textContent=`${ROLES[name]}:${NAMES[name]}`;
  document.getElementById('chat-avatar').src=`./assets/chars/${name}.png`;
  const msgs=document.getElementById('chat-msgs');
  msgs.innerHTML='';
  hist[name].forEach(m=>addMsg(m.role,m.content));
  document.getElementById('chat-panel').classList.add('open');
  document.getElementById('arko-bar').style.display='none';
  setTimeout(()=>document.getElementById('chat-in').focus(),50);
}
function closeChat(){
  document.getElementById('chat-panel').classList.remove('open');
  document.getElementById('arko-bar').style.display='flex';
}
function addMsg(role,content){
  const msgs=document.getElementById('chat-msgs');
  const d=document.createElement('div');
  d.className=role==='user'?'mu':(content==='...'?'mt':'ma');
  d.textContent=content;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
  return d;
}
async function sendChat(){
  const inp=document.getElementById('chat-in');
  const msg=inp.value.trim();
  if(!msg||!curEngine)return;
  inp.value='';
  const name=curEngine;
  if(!hist[name])hist[name]=[];
  hist[name].push({role:'user',content:msg});
  addMsg('user',msg);
  const thinking=addMsg('agent','...');
  try{
    const r=await fetch('http://localhost:3001/execute',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        projectId:'widget-chat',projectName:'widget-chat',projectType:'chat',
        taskType:'clarify',
        instruction:msg,context:{conversationHistory:hist[name].slice(0,-1)},
      })
    });
    const d=await r.json();
    const reply=d.output?.data?.message||d.output?.data?.reply||d.output?.data?.response||'(응답 없음)';
    thinking.remove();addMsg('agent',reply);
    hist[name].push({role:'assistant',content:reply});
    if(name==='arko'&&d.output?.data?.action==='ready'){
      const pd=d.output.data;const ctx=pd.gatheredContext||{};
      addMsg('agent','파이프라인 시작!');
      fetch('http://localhost:3001/pipeline',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({projectName:ctx.details||msg.slice(0,30),projectType:pd.projectType||'playlist',goal:pd.enrichedInstruction||msg,enrichedContext:ctx})
      });
    }
  }catch(e){thinking.remove();addMsg('agent','연결 오류가 발생했어요.');}
}

// ── 아르코 빠른 입력 ──────────────────────────
let arkoHistory=[];
let bubbleTimer=null;
document.getElementById('arko-quick').addEventListener('keydown',e=>{if(e.key==='Enter')sendQuick();});

async function sendQuick(){
  const inp=document.getElementById('arko-quick');
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  showBubble('생각 중...',true);
  try{
    const r=await fetch('http://localhost:3001/execute',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        projectId:'widget-quick',projectName:'widget',projectType:'unknown',
        taskType:'clarify',instruction:msg,
        context:{conversationHistory:arkoHistory},
      })
    });
    const d=await r.json();
    const data=d.output?.data||{};
    const reply=data.message||'...';
    arkoHistory.push({role:'user',content:msg});
    arkoHistory.push({role:'assistant',content:reply});
    if(arkoHistory.length>12)arkoHistory=arkoHistory.slice(-12);
    showBubble(reply,false);
    if(data.action==='ready'){
      const ctx=data.gatheredContext||{};
      setTimeout(()=>{
        showBubble('파이프라인 시작! 팀에게 전달할게요',false);
        fetch('http://localhost:3001/pipeline',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({projectName:ctx.details||msg.slice(0,30),projectType:data.projectType||'playlist',goal:data.enrichedInstruction||msg,enrichedContext:ctx})
        });
        arkoHistory=[];
      },600);
    }
  }catch(e){showBubble('연결 오류가 발생했어요.',false);}
}

function showBubble(text,thinking){
  const b=document.getElementById('arko-bubble');
  b.textContent=text;b.className=thinking?'thinking':'';
  b.style.display='block';
  clearTimeout(bubbleTimer);
  if(!thinking)bubbleTimer=setTimeout(()=>{b.style.display='none';},9000);
}

function prioritize(engine,idx){
  const q=S[engine].queue;
  if(idx>0&&idx<q.length){const[i]=q.splice(idx,1);q.unshift(i);}
  hideTip();
}
function openMain(){closeChat();window.widget&&window.widget.openMain();}

// ── 카드 ↔ 전체 위젯 전환 ──────────────────────
function expandWidget(){
  document.body.classList.remove('card-mode');
  if(window.widget)window.widget.resize('full');
}
function collapseToCard(){
  closeChat();
  document.body.classList.add('card-mode');
  if(window.widget)window.widget.resize('card');
}
document.body.classList.add('card-mode');

// ── 파이프라인 진행바 ─────────────────────────
const PL_STEPS=['noah','eden','ria','arko','mika','luka'];
const PL_LABELS={noah:'분석',eden:'기획',ria:'창작',arko:'검수',mika:'미디어',luka:'기록'};
const PL_COLORS={noah:'#f59e0b',eden:'#10b981',ria:'#f43f5e',arko:'#06b6d4',mika:'#8b5cf6',luka:'#3b82f6'};
let plActive=false;
let plDone=new Set();
let plCurrent=null;

function renderPipeline(){
  const bar=document.getElementById('pipeline-bar');
  const steps=document.getElementById('pl-steps');
  const status=document.getElementById('pl-status');
  if(!plActive){bar.style.display='none';return;}
  bar.style.display='flex';
  steps.innerHTML=PL_STEPS.map((s,i)=>{
    const isDone=plDone.has(s);
    const isCur=plCurrent===s;
    const color=isDone||isCur?PL_COLORS[s]:'#2d3548';
    const opacity=isDone||isCur?'1':'0.4';
    const icon=isDone?'✓':(isCur?'●':'○');
    const iconColor=isDone?'#22c55e':(isCur?PL_COLORS[s]:'#334155');
    const line=i<PL_STEPS.length-1?`<div style="flex:1;height:2px;background:${isDone?PL_COLORS[s]:'#1e293b'};margin:0 2px;min-width:8px;border-radius:1px"></div>`:'';
    return `<div style="display:flex;align-items:center;flex-direction:column;min-width:36px;opacity:${opacity}">
      <span style="font-size:10px;color:${iconColor};line-height:1">${icon}</span>
      <span style="font-size:7px;color:${color};margin-top:1px">${PL_LABELS[s]}</span>
    </div>${line}`;
  }).join('');
  status.textContent=plCurrent?`${PL_LABELS[plCurrent]} 진행 중...`:'완료';
}

// ── SSE ──────────────────────────────────────
try{
  const es=new EventSource('http://localhost:3001/events');
  es.addEventListener('pipeline:start',e=>{
    plActive=true;plDone=new Set();plCurrent=null;renderPipeline();
  });
  ['engine:status','engine:done','engine:error'].forEach(t=>{
    es.addEventListener(t,e=>{
      const d=JSON.parse(e.data);
      if(d.engine)setState(d.engine,t==='engine:status'&&d.status==='working',d.task||null);
      if(plActive&&d.engine){
        const eng=d.step==='arko-review'?'arko':d.engine;
        if(t==='engine:status'&&d.status==='working'){plCurrent=eng;}
        if(t==='engine:done'){plDone.add(eng);if(plCurrent===eng)plCurrent=null;}
        renderPipeline();
      }
    });
  });
  es.addEventListener('pipeline:done',e=>{
    Object.keys(S).forEach(n=>setState(n,false));
    plDone=new Set(PL_STEPS);plCurrent=null;renderPipeline();
    setTimeout(()=>{plActive=false;renderPipeline();},5000);
  });
  es.addEventListener('pipeline:retry',e=>{
    const d=JSON.parse(e.data);
    plDone.delete('arko');plDone.delete('ria');
    document.getElementById('pl-status').textContent=`재시도 #${d.retryCount}`;
    renderPipeline();
  });
}catch(e){}
</script>
</body>
</html>
